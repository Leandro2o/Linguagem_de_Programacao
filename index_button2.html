<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button</title>
</head>
<body>
    <h1>Pagina com soma</h1>
    <button type="button" onclick="cliqueBotao()">
    Clique aqui</button>
</body>
<script>
    function cliqueBotao(){
        let v1 = 5;
        let v2 = 5;
        let v3 = v1 + v2;
        alert("A soma de "+v1+" e "+v2+" é igual a "+v3);
    }
</script>
</html>
