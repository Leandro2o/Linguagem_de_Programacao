<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>button</title>
</head>
<body>
    <h1>Pagina com botao</h1>
    <button type="button" onclick="cliqueBotao()">
    Clique aqui</button>
</body>
<script>
    function cliqueBotao() {
        alert("Voce clicou no botao!");
    }
</script>
</html>
